# Sample Protocol Definition
#
# Frame structure:
#   ENQ(05) + Address(3) = 4 bytes fixed
#   EOT(04) + Address(3) = 4 bytes fixed
#   ACK(06) + Address(3) = 4 bytes fixed
#   NAK(15) + Address(3) = 4 bytes fixed
#   STX(02) + Dest(3) + Src(3) + Data(n) + ETX(03) + BCC(2)
#
# Data field:
#   Command code (2-byte ASCII) + fields

[protocol]
title = "Sample Protocol"
frame_idle_threshold_ms = 5.0

# Frame rules
[[protocol.frame_rules]]
trigger = "02"       # STX -> ETX + BCC (2 bytes)
end = "03"
end_extra = 2
max_length = 256

[[protocol.frame_rules]]
trigger = "05"       # ENQ + Address (3 bytes) = 4 bytes fixed
length = 4

[[protocol.frame_rules]]
trigger = "04"       # EOT + Address (3 bytes) = 4 bytes fixed
length = 4

[[protocol.frame_rules]]
trigger = "06"       # ACK + Address (3 bytes) = 4 bytes fixed
length = 4

[[protocol.frame_rules]]
trigger = "15"       # NAK + Address (3 bytes) = 4 bytes fixed
length = 4

# ============================================================
# Control commands (fixed-length frames)
# ============================================================

[[messages]]
id = "enq"
title = "ENQ"
color = "78A0DC"
pattern = "^05[0-9A-F]{6}$"

[[messages.fields]]
name = "Addr"
offset = 1
size = 3
inline = true

[[messages]]
id = "eot"
title = "EOT"
color = "88909F"
pattern = "^04[0-9A-F]{6}$"

[[messages.fields]]
name = "Addr"
offset = 1
size = 3
inline = true

[[messages]]
id = "ack"
title = "ACK"
color = "78C88C"
pattern = "^06[0-9A-F]{6}$"

[[messages.fields]]
name = "Addr"
offset = 1
size = 3
inline = true

[[messages]]
id = "nak"
title = "NAK"
color = "D47070"
pattern = "^15[0-9A-F]{6}$"

[[messages.fields]]
name = "Addr"
offset = 1
size = 3
inline = true

# ============================================================
# Data messages (STX...ETX+BCC)
# STX + Dest(3) + Src(3) + Cmd(2) + Data + ETX + BCC(2)
# ============================================================

[[messages]]
id = "msg_a"
title = "Message A"
color = "D4A56A"
pattern = "^02[0-9A-F]{6}[0-9A-F]{6}3331[0-9A-F]{8}03[0-9A-F]{4}$"

[[messages.fields]]
name = "Dest"
offset = 1
size = 3
inline = true

[[messages.fields]]
name = "Src"
offset = 4
size = 3
inline = true

[[messages.fields]]
name = "Mode"
offset = 9
size = 1
description = "0=Normal, 1=ModeA, 2=ModeB, 3=ModeC, 4=ModeD"

[[messages.fields]]
