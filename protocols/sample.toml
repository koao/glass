# Sample Protocol Definition
#
# Transport:
#   ENQ(05) + Type(1) + Addr(2) = 4 bytes
#   EOT(04) + Type(1) + Addr(2) = 4 bytes
#   ACK(06) + Type(1) + Addr(2) = 4 bytes
#   NAK(15) + Type(1) + Addr(2) = 4 bytes
#   STX(02) + Type(1) + Addr(2) + Data(n) + ETX(03) + CRC(2)

[protocol]
title = "Sample Protocol"
frame_idle_threshold_ms = 1.7

[protocol.sequence]
broadcast = "99"
master = "M"

[[protocol.frame_rules]]
trigger = "02"
end = "03"
end_extra = 2
max_length = 256
checksum = { algorithm = "crc16_arc", range = "after_trigger_to_end", size = 2, endian = "big" }

[[protocol.frame_rules]]
trigger = "05"
length = 4

[[protocol.frame_rules]]
trigger = "04"
length = 4

[[protocol.frame_rules]]
trigger = "06"
length = 4

[[protocol.frame_rules]]
trigger = "15"
length = 4

# ============================================================
# Control
# ============================================================

[[messages]]
id = "enq"
title = "ENQ"
color = "78A0DC"
pattern = "^05[0-9A-F]{6}$"
sequence_source = "=M"
sequence_destination = "{Type}:{Addr}"

[[messages.fields]]
name = "Type"
offset = 1
size = 1
inline = true

[[messages.fields]]
name = "Addr"
offset = 2
size = 2
inline = true

[[messages]]
id = "eot"
title = "EOT"
color = "88909F"
pattern = "^04[0-9A-F]{6}$"
sequence_source = "{Type}:{Addr}"
sequence_destination = "=M"

[[messages.fields]]
name = "Type"
offset = 1
size = 1
inline = true

[[messages.fields]]
name = "Addr"
offset = 2
size = 2
inline = true

[[messages]]
id = "ack"
title = "ACK"
color = "78C88C"
pattern = "^06[0-9A-F]{6}$"

[[messages.fields]]
name = "Type"
offset = 1
size = 1
inline = true

[[messages.fields]]
name = "Addr"
offset = 2
size = 2
inline = true

[[messages]]
id = "nak"
title = "NAK"
color = "D47070"
pattern = "^15[0-9A-F]{6}$"

[[messages.fields]]
name = "Type"
offset = 1
size = 1
inline = true

[[messages.fields]]
name = "Addr"
offset = 2
size = 2
inline = true

