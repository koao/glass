name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('Cargo.lock') }}

      - name: Build
        run: cargo build --release
        env:
          RUSTFLAGS: "-C target-feature=+crt-static"

      - name: Package
        run: Compress-Archive -Path target/release/glass.exe, protocols -DestinationPath glass-windows-x64.zip

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: glass-windows-x64.zip
          generate_release_notes: true
